<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Mecánicas — KOF Wing EX</title>
<link rel="icon" type="image/png" href="kofwing_200-9.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0e;
    --bg2: #111118;
    --bg3: #16161f;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --accent: #a855f7;
    --accent-glow: rgba(168,85,247,0.3);
    --accent2: #38bdf8;
    --accent2-glow: rgba(56,189,248,0.25);
    --accent3: #f472b6;
    --gold: #fbbf24;
    --gold-glow: rgba(251,191,36,0.2);
    --green: #34d399;
    --red: #f87171;
    --text: #ece8f5;
    --muted: #7b77a0;
    --faint: #2e2c40;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== NAV ===== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 2rem;
    background: rgba(10,10,14,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--text);
    text-transform: uppercase;
    text-decoration: none;
  }
  .nav-logo img { height: 28px; }
  .nav-logo span { color: var(--accent); }
  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
  }
  .nav-links a {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--text); }
  .nav-links a.active { color: var(--accent); }

  /* ===== HERO BANNER ===== */
  .hero {
    position: relative;
    height: 340px;
    margin-top: 56px;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background: 
      linear-gradient(to bottom, rgba(10,10,14,0.2) 0%, rgba(10,10,14,0.7) 70%, var(--bg) 100%),
      linear-gradient(135deg, rgba(168,85,247,0.15) 0%, transparent 50%, rgba(56,189,248,0.1) 100%);
    background-color: #1a0a2e;
  }
  /* Decorative grid lines */
  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      linear-gradient(rgba(168,85,247,0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168,85,247,0.08) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: linear-gradient(to bottom, transparent, rgba(0,0,0,0.5) 30%, rgba(0,0,0,0.5) 70%, transparent);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding-bottom: 3rem;
  }
  .hero-eyebrow {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.2s forwards;
  }
  .hero-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(48px, 8vw, 80px);
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--text);
    line-height: 1;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.35s forwards;
  }
  .hero-title span {
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.3);
  }
  .hero-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 0.75rem;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s forwards;
  }
  /* Glowing orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    pointer-events: none;
  }
  .orb-1 { width: 300px; height: 300px; background: rgba(168,85,247,0.2); top: -80px; left: 15%; }
  .orb-2 { width: 200px; height: 200px; background: rgba(56,189,248,0.15); top: 20px; right: 20%; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ===== LAYOUT ===== */
  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    max-width: 1160px;
    margin: 0 auto;
    min-height: calc(100vh - 56px - 340px);
    gap: 0;
  }

  /* ===== SIDEBAR ===== */
  aside {
    border-right: 1px solid var(--border);
    padding: 1.5rem 0.75rem;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  aside::-webkit-scrollbar { width: 2px; }
  aside::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

  .nav-group-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--faint);
    padding: 0 0.75rem;
    margin: 1.5rem 0 0.4rem;
  }
  .nav-group-label:first-child { margin-top: 0; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    background: none;
    border: none;
    border-left: 2px solid transparent;
    color: var(--muted);
    font-family: 'Noto Sans', sans-serif;
    font-size: 13px;
    padding: 8px 0.75rem;
    border-radius: 0 6px 6px 0;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
  .nav-btn.active {
    color: var(--accent);
    background: rgba(168,85,247,0.08);
    border-left-color: var(--accent);
  }
  .nav-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--faint);
    min-width: 20px;
    transition: color 0.15s;
  }
  .nav-btn.active .nav-num { color: var(--accent); opacity: 0.7; }

  /* ===== MAIN ===== */
  main {
    padding: 2.5rem 2.5rem 5rem;
    overflow-y: auto;
    min-height: 100%;
  }
  main::-webkit-scrollbar { width: 3px; }
  main::-webkit-scrollbar-thumb { background: var(--faint); border-radius: 2px; }

  /* ===== SECTION ===== */
  .section { display: none; animation: sectionIn 0.25s ease; }
  .section.active { display: block; }
  @keyframes sectionIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 0.2rem;
  }
  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--text);
  }
  .section-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    color: var(--faint);
    letter-spacing: 2px;
  }
  .section-desc {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  /* ===== CARDS ===== */
  .grid { display: grid; gap: 12px; margin-bottom: 1.5rem; }
  .grid-2 { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
  .grid-3 { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
  .grid-4 { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 10px;
  }
  .card:hover { transform: translateY(-2px); }
  .card:hover::after { opacity: 1; }

  .card.c-purple { border-left: 3px solid var(--accent); }
  .card.c-purple:hover { box-shadow: 0 0 20px var(--accent-glow); border-color: rgba(168,85,247,0.4); }
  .card.c-blue   { border-left: 3px solid var(--accent2); }
  .card.c-blue:hover { box-shadow: 0 0 20px var(--accent2-glow); border-color: rgba(56,189,248,0.3); }
  .card.c-gold   { border-left: 3px solid var(--gold); }
  .card.c-gold:hover { box-shadow: 0 0 20px var(--gold-glow); border-color: rgba(251,191,36,0.3); }
  .card.c-green  { border-left: 3px solid var(--green); }
  .card.c-green:hover { box-shadow: 0 0 16px rgba(52,211,153,0.2); }
  .card.c-pink   { border-left: 3px solid var(--accent3); }
  .card.c-pink:hover { box-shadow: 0 0 16px rgba(244,114,182,0.2); }
  .card.c-red    { border-left: 3px solid var(--red); }
  .card.c-red:hover { box-shadow: 0 0 16px rgba(248,113,113,0.2); }

  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-text { font-size: 13px; color: var(--muted); line-height: 1.65; }

  /* ===== TAGS ===== */
  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Rajdhani', sans-serif;
    letter-spacing: 1px;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
  }
  .tag-purple { background: rgba(168,85,247,0.12); color: var(--accent); border: 1px solid rgba(168,85,247,0.25); }
  .tag-blue   { background: rgba(56,189,248,0.1); color: var(--accent2); border: 1px solid rgba(56,189,248,0.25); }
  .tag-gold   { background: rgba(251,191,36,0.1); color: var(--gold); border: 1px solid rgba(251,191,36,0.25); }
  .tag-green  { background: rgba(52,211,153,0.1); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
  .tag-pink   { background: rgba(244,114,182,0.1); color: var(--accent3); border: 1px solid rgba(244,114,182,0.25); }
  .tag-red    { background: rgba(248,113,113,0.1); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }

  /* ===== ENTRY ===== */
  .entry { margin-bottom: 1.25rem; }
  .entry-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 5px;
  }
  .entry-text { font-size: 14px; color: var(--text); line-height: 1.75; }
  .entry-text strong { color: var(--accent); font-weight: 500; }

  /* ===== TIP / WARN ===== */
  .tip {
    background: rgba(168,85,247,0.05);
    border: 1px solid rgba(168,85,247,0.18);
    border-radius: 8px;
    padding: 0.85rem 1.1rem;
    font-size: 13px;
    color: #c9bce8;
    line-height: 1.65;
    margin: 1rem 0;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .warn {
    background: rgba(251,191,36,0.05);
    border: 1px solid rgba(251,191,36,0.18);
    border-radius: 8px;
    padding: 0.85rem 1.1rem;
    font-size: 13px;
    color: #e8d49a;
    line-height: 1.65;
    margin: 1rem 0;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .tip-icon { font-size: 15px; margin-top: 2px; flex-shrink: 0; }

  /* ===== DIVIDER ===== */
  .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

  /* ===== BUTTON ROW ===== */
  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 2.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }
  .btn-nav {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 9px 20px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--muted);
  }
  .btn-nav:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .btn-nav.primary {
    background: rgba(168,85,247,0.1);
    color: var(--accent);
    border-color: rgba(168,85,247,0.35);
  }
  .btn-nav.primary:hover {
    background: rgba(168,85,247,0.18);
    box-shadow: 0 0 16px var(--accent-glow);
  }

  /* ===== KEY BUTTONS ===== */
  .key {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px; height: 26px;
    border-radius: 5px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid;
  }
  .key-a { background: rgba(248,113,113,0.12); color: var(--red); border-color: rgba(248,113,113,0.3); }
  .key-b { background: rgba(56,189,248,0.1); color: var(--accent2); border-color: rgba(56,189,248,0.3); }
  .key-c { background: rgba(251,191,36,0.1); color: var(--gold); border-color: rgba(251,191,36,0.3); }
  .key-d { background: rgba(52,211,153,0.1); color: var(--green); border-color: rgba(52,211,153,0.3); }

  /* ===== BURST CARDS ===== */
  .burst-grid { display: grid; gap: 12px; }
  .burst-card {
    background: var(--bg2);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 1.1rem 1.25rem;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0 1.1rem;
    align-items: start;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .burst-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
    margin-top: 3px;
  }
  .burst-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .burst-text { font-size: 13px; color: var(--muted); line-height: 1.65; }
  .burst-text strong { color: var(--text); font-weight: 500; }

  /* ===== PROGRESS BAR (section indicator) ===== */
  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 2rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  /* ===== MOBILE NAV ===== */
  @media (max-width: 680px) {
    .layout { grid-template-columns: 1fr; }
    aside { display: none; }
    main { padding: 1.5rem 1rem 3rem; }
    .mobile-nav {
      display: flex;
      overflow-x: auto;
      gap: 6px;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 56px;
      z-index: 90;
      scrollbar-width: none;
    }
    .mobile-nav::-webkit-scrollbar { display: none; }
    .mobile-nav button {
      flex-shrink: 0;
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      background: var(--bg2);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .mobile-nav button.active {
      background: rgba(168,85,247,0.12);
      color: var(--accent);
      border-color: rgba(168,85,247,0.35);
    }
    .nav-links { display: none; }
    .hero { height: 220px; }
  }
  @media (min-width: 681px) { .mobile-nav { display: none; } }
</style>
</head>

<script>
const sections = [
  {
    id: "mov",
    title: "Movimiento básico",
    group: "Fundamentos",
    content: () => `
      <p class="section-desc">El personaje mira hacia la derecha por defecto. Todas las direcciones se describen desde ese punto de vista.</p>
      <div class="grid grid-2">
        <div class="card c-blue">
          <div class="card-title"><span class="tag tag-blue">Adelante / Atrás</span></div>
          <div class="card-text">Presiona la dirección correspondiente para caminar. Es la base del posicionamiento.</div>
        </div>
        <div class="card c-blue">
          <div class="card-title"><span class="tag tag-blue">Avance rápido</span></div>
          <div class="card-text">Doble toque hacia adelante. Cubre distancia velozmente para presionar al rival.</div>
        </div>
        <div class="card c-blue">
          <div class="card-title"><span class="tag tag-blue">Retroceso rápido</span></div>
          <div class="card-text">Doble toque hacia atrás. Útil para escapar de la presión o crear distancia.</div>
        </div>
        <div class="card c-blue">
          <div class="card-title"><span class="tag tag-blue">Agacharse</span></div>
          <div class="card-text">Mantén abajo. Reduce tu perfil y activa ataques y defensas agachadas.</div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="entry">
        <div class="entry-label">Tipos de salto</div>
        <div class="entry-text">La <strong>altura</strong> del salto depende del tiempo que mantengas presionado el botón de salto: salto pequeño, salto medio o salto grande. La <strong>dirección</strong> se determina con el botón de salto que uses: salto atrás, salto vertical o salto adelante.</div>
      </div>
      <div class="entry">
        <div class="entry-label">Salto sombra</div>
        <div class="entry-text">Durante el avance rápido, ciertos botones activan un salto con alta velocidad horizontal. Útil para cruzar al rival o esquivar proyectiles.</div>
      </div>
      <div class="tip"><div class="tip-icon">💡</div><div>Controlar tu posición con flexibilidad es clave para sacar ventaja tanto en combate cuerpo a cuerpo como en combos. El movimiento es la base de todo lo demás.</div></div>
    `
  },
  {
    id: "ataques",
    title: "Ataques y defensa",
    group: "Fundamentos",
    content: () => `
      <p class="section-desc">Cuatro botones de ataque que se combinan con tu posición para generar ataques de pie, agachado y aéreos.</p>
      <div class="grid grid-4">
        <div class="card">
          <div class="card-title"><span class="key key-a">A</span></div>
          <div class="card-text"><strong style="color:var(--text)">Puñetazo ligero</strong><br>Rápido, poco daño. Base de muchos combos.</div>
        </div>
        <div class="card">
          <div class="card-title"><span class="key key-b">B</span></div>
          <div class="card-text"><strong style="color:var(--text)">Patada ligera</strong><br>Rápida, útil para confirmar ataques bajos.</div>
        </div>
        <div class="card">
          <div class="card-title"><span class="key key-c">C</span></div>
          <div class="card-text"><strong style="color:var(--text)">Puñetazo fuerte</strong><br>Más lento, mayor daño. Buena base de combos.</div>
        </div>
        <div class="card">

let current = 0;

function groupBy(arr, key) {
  return arr.reduce((g, item, i) => {
    const k = item[key];
    if (!g[k]) g[k] = [];
    g[k].push({ ...item, idx: i });
    return g;
  }, {});
}

function renderNav() {
  const sidebar = document.getElementById('sidebar');
  const mobileNav = document.getElementById('mobileNav');
  const groups = groupBy(sections, 'group');

  let sideHTML = '';
  for (const [group, items] of Object.entries(groups)) {
    sideHTML += `<div class="nav-group-label">${group}</div>`;
    items.forEach(({ title, idx }) => {
      sideHTML += `<button class="nav-btn${idx === current ? ' active' : ''}" onclick="show(${idx})">
        <span class="nav-num">${String(idx+1).padStart(2,'0')}</span>${title}
      </button>`;
    });
  }
  sidebar.innerHTML = sideHTML;

  let mobileHTML = '';
  sections.forEach(({ title }, i) => {
    mobileHTML += `<button class="${i === current ? 'active' : ''}" onclick="show(${i})">${title}</button>`;
  });
  mobileNav.innerHTML = mobileHTML;
}

function renderMain() {
  const sec = sections[current];
  const prev = current > 0 ? sections[current - 1] : null;
  const next = current < sections.length - 1 ? sections[current + 1] : null;
  const pct = Math.round(((current + 1) / sections.length) * 100);

  const btnRow = `
    <div class="btn-row">
      ${prev ? `<button class="btn-nav" onclick="show(${current-1})">← ${prev.title}</button>` : ''}
      ${next ? `<button class="btn-nav primary" onclick="show(${current+1})">${next.title} →</button>` : ''}
    </div>`;

  document.getElementById('main').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="section active">
      <div class="section-header">
        <div class="section-title">${sec.title}</div>
        <span class="section-num">${String(current+1).padStart(2,'0')} / ${sections.length}</span>
      </div>
      ${sec.content()}
      ${btnRow}
    </div>`;
}

function show(idx) {
  current = idx;
  renderNav();
  renderMain();
  document.getElementById('main').scrollTop = 0;
  const mobileNav = document.getElementById('mobileNav');
  const activeBtn = mobileNav.children[idx];
  if (activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
}

renderNav();
renderMain();
</script>
