    .tierlist-wrap { max-width: 1400px; margin: 0 auto; padding: 0 20px 20px; }

    .tier-row { display: flex; align-items: stretch; margin-bottom: 8px; border-radius: 8px; overflow: hidden; min-height: 120px; }
    .tier-label { width: 90px; min-width: 90px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 2px; font-weight: 700; }

    .tier-C .tier-label { background: #44bb44; }

    .tier-F .tier-label { background: #884488; }

    .tier-slots.drag-over { background: rgba(168,85,247,0.15); border-color: #a855f7; }

    /* watermark */
    .wm { text-align: center; padding: 10px 0 4px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 4px; color: rgba(168,85,247,0.5); }

    .pool-section { max-width: 1400px; margin: 24px auto 0; padding: 0 20px 60px; }
    .pool-title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 4px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
    .pool { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 8px; display: flex; flex-wrap: wrap; gap: 8px; padding: 14px; min-height: 130px; transition: background 0.2s; }
    .pool.drag-over { background: rgba(168,85,247,0.1); border-color: #a855f7; }

    /* CARDS MÁS GRANDES */
    .char-card { width: 100px; cursor: grab; border-radius: 8px; overflow: hidden; position: relative; transition: transform 0.15s, box-shadow 0.15s; user-select: none; flex-shrink: 0; }
    .char-card:active { cursor: grabbing; transform: scale(1.1); box-shadow: 0 8px 24px rgba(168,85,247,0.5); }
    .char-card img { width: 100%; height: 110px; object-fit: cover; object-position: top; display: block; }
    .char-card .char-name { background: rgba(0,0,0,0.85); font-size: 11px; letter-spacing: 1px; text-align: center; padding: 4px 4px; color: #fff; text-transform: uppercase; font-weight: 700; line-height: 1.2; }
    .char-card.dragging { opacity: 0.4; }

    /* BOTÓN GUARDAR */
    .actions { display: flex; justify-content: center; gap: 12px; margin: 20px auto; max-width: 1400px; padding: 0 20px; }
    .btn-img {
      font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700;
      letter-spacing: 2px; padding: 12px 32px; border-radius: 8px; border: none;
      cursor: pointer; text-transform: uppercase; transition: all 0.2s;
      background: linear-gradient(135deg, #a855f7, #7c3aed);
      color: #fff; box-shadow: 0 4px 20px rgba(168,85,247,0.4);
      display: flex; align-items: center; gap: 8px;
    }
    .btn-img:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(168,85,247,0.6); }
    .btn-img:active { transform: translateY(0); }
    .btn-img svg { width: 18px; height: 18px; }

    .status { text-align: center; font-size: 12px; color: #a855f7; letter-spacing: 2px; margin-top: 8px; height: 20px; }

      .char-card { width: 72px; }
      .char-card img { height: 80px; }
      .char-card .char-name { font-size: 9px; }
    }

const TIERS = ['S','A','B','C','D','F'];
let tierData = { S:[], A:[], B:[], C:[], D:[], F:[], pool: CHARACTERS.map(c => c.id) };
let dragId = null;

function getChar(id) { return CHARACTERS.find(c => c.id === id); }

function makeCard(charId) {
  const ch = getChar(charId);
  if (!ch) return null;
  const card = document.createElement('div');
  card.className = 'char-card';
  card.draggable = true;
  card.dataset.id = charId;
  card.innerHTML = `<img src="${ch.img}" alt="${ch.name}" onerror="this.style.background='#2a1f4a';this.style.height='110px'"><div class="char-name">${ch.name}</div>`;
  card.addEventListener('dragstart', () => { dragId = charId; setTimeout(() => card.classList.add('dragging'), 0); });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));
  return card;
}

function renderAll() {
  TIERS.forEach(t => {
    const el = document.getElementById('tier-' + t);
    el.innerHTML = '';
    (tierData[t] || []).forEach(id => { const c = makeCard(id); if(c) el.appendChild(c); });
  });
  const pool = document.getElementById('pool');
  pool.innerHTML = '';
  (tierData.pool || []).forEach(id => { const c = makeCard(id); if(c) pool.appendChild(c); });
}

function setupDrop(el) {
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-over');
    if (!dragId) return;
    const destTier = el.dataset.tier;
    TIERS.forEach(t => { tierData[t] = (tierData[t]||[]).filter(id => id !== dragId); });
    tierData.pool = (tierData.pool||[]).filter(id => id !== dragId);
    if (!tierData[destTier]) tierData[destTier] = [];
    tierData[destTier].push(dragId);
    dragId = null;
    renderAll();
  });
}

TIERS.forEach(t => setupDrop(document.getElementById('tier-' + t)));
setupDrop(document.getElementById('pool'));

async function saveAsImage() {
  const btn = document.querySelector('.btn-img');
  const status = document.getElementById('status');
  btn.textContent = '⏳ Generando imagen...';
  status.textContent = 'Capturando tier list...';
  try {
    const zone = document.getElementById('capture-zone');
    const canvas = await html2canvas(zone, {
      backgroundColor: '#0a0010', scale: 2, useCORS: true, allowTaint: true, logging: false
    });
    const link = document.createElement('a');
    link.download = 'kof-wingex-tierlist.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    status.textContent = '✅ ¡Imagen descargada!';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Guardar como imagen`;
    setTimeout(() => { status.textContent = ''; }, 3000);
  } catch(err) {
    status.textContent = '❌ Error al generar la imagen.';
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Guardar como imagen`;
    console.error(err);
  }
}

renderAll();
</script>
